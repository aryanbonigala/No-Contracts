# Alembic — Kalshi NO Carry (see docs/DATA_SCHEMA.md and README.md).
# DATABASE_URL is read at migration time from the environment (or .env via
# Settings); do not put real credentials in this file.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/src:%(here)s
path_separator = os
version_path_separator = os

# sqlalchemy.url is overridden in env.py from DATABASE_URL / Settings.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
